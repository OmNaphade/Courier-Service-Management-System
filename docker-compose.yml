version: '3.8'
services:
  backend:
    image: ghcr.io/${{ github.repository }}/backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      - db
  frontend:
    image: ghcr.io/${{ github.repository }}/frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: manager
      MYSQL_DATABASE: courier
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
